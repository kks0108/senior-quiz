    <style>
        /* --- 動畫定義 --- */
        @keyframes fadeInDown {
          from { opacity: 0; transform: translateY(-20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes move-blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        /* 分數變化時的卡片彈跳與發光 (增強版) */
        @keyframes score-bump {
            0% { transform: scale(1); }
            40% { transform: scale(1.1); filter: brightness(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { transform: scale(1); }
        }

        /* 加減分數字的浮動淡出動畫 (增強版) */
        @keyframes float-out-up {
            0% { opacity: 0; transform: translate(-50%, 0px) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80px) scale(1); }
        }
        
        /* --- 應用動畫類別 --- */
        .animate-fade-in-down { animation: fadeInDown 0.8s ease-out; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-blob { animation: move-blob 10s infinite; }
        .animate-score-bump { animation: score-bump 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-score-float { animation: float-out-up 1s ease-out forwards; }
        
        /* --- 針對 iPad 投影優化：隱藏滾動條，鎖定畫面 --- */
        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 禁止捲動 */
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            touch-action: manipulation;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
        }
        body::-webkit-scrollbar { display: none; }
        
        button:active { transform: scale(0.96); }

        /* --- 全新高中主題：成熟冷靜背景 + 寶覺中學圖片 --- */
        .custom-bg {
            background-color: #EEF2FF; /* Indigo 50 底色 */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Po_Kok_Secondary_School_2018.jpg/1200px-Po_Kok_Secondary_School_2018.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 卡片樣式 - 科技感/專業感懸浮 */
        .bright-card {
            background: rgba(255, 255, 255, 0.55); /* 降低不透明度，增強半透明毛玻璃效果 */
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.25); /* Indigo 陰影 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.5rem;
        }

        .bright-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px -10px rgba(99, 102, 241, 0.4);
            border-color: #818CF8;
        }
        
        /* 按鈕樣式 - 靛藍色漸層 (Indigo to Deep Purple) */
        .gradient-btn {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
        }
        .gradient-btn:hover {
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* 文字陰影 */
        .text-shadow-sm {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        /* 文字描邊，讓浮動分數更清晰 */
        .text-stroke {
            -webkit-text-stroke: 1.5px white;
            paint-order: stroke fill;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 四社顏色變數 (Tailwind Utility) - 維持不變 */

        .house-blue { @apply bg-blue-500 text-white border-blue-600; }
        .house-green { @apply bg-green-500 text-white border-green-600; }
    </style>
</head>

                    {/* 刪除外層大長方卡片，改為直接放置半透明毛玻璃按鈕卡片 */}
                    <div className="grid grid-cols-2 gap-8 w-full max-w-4xl mb-10 z-10 relative">
                        <button onClick={goToRound1Menu} className="bg-white/40 backdrop-blur-md border border-white/60 shadow-xl p-12 rounded-3xl flex flex-col items-center justify-center gap-4 group hover:scale-105 hover:bg-white/50 transition-all">
                            <BookOpen size={64} className="text-indigo-800 transition-transform group-hover:-translate-y-2" />
                            <span className="text-4xl font-bold text-indigo-900 drop-shadow-sm">第一回合：必答題</span>
                        </button>
                        <button onClick={startRound2} className="bg-white/40 backdrop-blur-md border border-white/60 shadow-xl p-12 rounded-3xl flex flex-col items-center justify-center gap-4 group hover:scale-105 hover:bg-white/50 transition-all">
                            <Zap size={64} className="text-indigo-800 transition-transform group-hover:-translate-y-2" />
                            <span className="text-4xl font-bold text-indigo-900 drop-shadow-sm">第二回合：搶答題</span>
                        </button>
                    </div>
                    
                    <div className="z-10 w-full relative mt-auto">
                        <ScoreBoard />
                    </div>
                </div>
            );

            // 第一回合選單
            const renderRound1Menu = () => (
                <div className="flex-1 flex flex-col p-8 animate-fade-in-up">
                    <button onClick={handleMainMenu} className="self-start mb-6 flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-800 bg-white/50 px-4 py-2 rounded-full backdrop-blur">
                        <Home size={24} /> 返回主選單
                    </button>
                    
                    <div className="flex-1 flex flex-col justify-center items-center">
                        <h2 className="text-5xl font-black text-indigo-800 mb-10">請選擇必答題套組</h2>
                        <div className="grid grid-cols-2 gap-8 w-full max-w-4xl">
                            {['A', 'B', 'C', 'D'].map(set => {
                                const isCompleted = !!round1History[set];
                                return (
                                    <button 
                                        key={set} 
                                        onClick={() => startRound1Set(set)} 
                                        className={`bright-card p-12 text-5xl font-black flex justify-center items-center transition-all ${isCompleted ? 'bg-gray-200 text-gray-500 opacity-80' : 'bright-card-hover text-indigo-600'}`}
                                    >
                                        Set {set} {isCompleted && <span className="text-2xl ml-4 font-bold text-gray-500">(已完成)</span>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            // 遊戲總結頁面
            const renderSummary = () => {
                const correctCount = Object.values(results).filter(r => r === 'correct').length;
                const totalPoints = correctCount * 10;
                const isRound1 = viewMode === 'ROUND_1_GAME';
                const historyData = isRound1 ? round1History[currentSet] : null;
                const awardedHouseName = historyData?.awardedHouse ? HOUSES.find(h => h.id === historyData.awardedHouse)?.name : null;

                return (
                    <div className="flex-1 flex flex-col p-8 animate-fade-in-up">
                         <div className="flex gap-4 self-start mb-6">
                             <button onClick={handleMainMenu} className="flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-800 bg-white/50 px-4 py-2 rounded-full backdrop-blur">
                                <Home size={24} /> 返回主選單
                            </button>
                            {isRound1 && (
                                <button onClick={goToRound1Menu} className="flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-800 bg-white/50 px-4 py-2 rounded-full backdrop-blur">
                                    <ChevronLeft size={24} /> 返回題庫選單
                                </button>
                            )}
                        </div>
                        
                        <div className="flex-1 flex flex-col justify-center items-center">
                            <div className="bright-card p-12 w-full max-w-4xl text-center">
                                <Trophy size={80} className="mx-auto text-yellow-500 mb-6" />
                                <h2 className="text-5xl font-black text-gray-800 mb-6">
                                    {isRound1 ? `第一回合 Set ${currentSet} 完成` : '第二回合 完成'}
                                </h2>
                                
                                {isRound1 && (
                                    <>
                                        <p className="text-3xl text-gray-600 mb-8">
                                            共答對 <span className="text-green-600 font-bold">{correctCount}</span> 題，可獲得 <span className="text-indigo-600 font-bold">{totalPoints}</span> 分
                                        </p>
                                        {!round1BonusGiven ? (
                                            <div className="mt-8">
                                                <p className="text-xl text-gray-500 mb-4">請選擇加分對象：</p>
                                                <div className="flex justify-center gap-4">
                                                    {HOUSES.map(house => (
                                                        <button key={house.id} onClick={() => awardRound1Points(house.id)} className={`${house.color} px-6 py-3 rounded-xl text-2xl font-bold shadow-lg hover:brightness-110 transition`}>
                                                            加給 {house.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <p className="text-2xl text-green-600 font-bold mt-8 flex items-center justify-center gap-2">
                                                <CheckCircle size={32} /> 已完成加分 {awardedHouseName ? `(${awardedHouseName})` : ''}
                                            </p>
                                        )}
                                        
                                        <div className="mt-10 flex justify-center">
                                            <button onClick={() => { setIsReviewMode(true); setShowSummary(false); setQuestionIndex(0); }} className="gradient-btn px-8 py-4 rounded-xl text-2xl font-bold flex items-center gap-3">
                                                <Eye size={28} /> 回顧答題結果
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // 遊戲進行畫面 (問題展示)
            const renderGame = () => {
                if (activeQuestions.length === 0) return null;
                const question = activeQuestions[questionIndex];
                const isRound1 = viewMode === 'ROUND_1_GAME';
                const currentResult = results[questionIndex];

                return (
                    <div className="flex-1 flex flex-col p-8 relative h-full">
                        {/* 頂部導航與進度 */}
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={handleMainMenu} className="flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-800 bg-white/50 px-4 py-2 rounded-full backdrop-blur">
                                <Home size={24} /> 返回主選單
                            </button>
                            <div className="flex items-center gap-4">
                                <span className="px-6 py-2 bg-indigo-100 text-indigo-800 text-2xl font-bold rounded-full">
                                    {isRound1 ? `必答題 Set ${currentSet}` : '搶答題'}
                                    {isReviewMode && ' (回顧模式)'}
                                </span>
                                <span className="text-2xl font-black text-gray-500">
                                    {questionIndex + 1} / {activeQuestions.length}
                                </span>
                            </div>
                        </div>

                        {/* 進度圓點指示器 */}
                        <div className="flex flex-wrap justify-center items-center gap-3 mb-6 max-w-4xl mx-auto">
                            {activeQuestions.map((_, idx) => {
                                const res = results[idx];
                                let bgClass = "bg-gray-300"; 
                                if (res === 'correct') bgClass = "bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]";
                                if (res === 'incorrect') bgClass = "bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]";
                                
                                let dotClass = `w-4 h-4 rounded-full transition-all duration-300 ${bgClass} `;
                                if (idx === questionIndex) {
                                    dotClass += "ring-4 ring-indigo-400 ring-offset-2 scale-125 ";
                                }
                                
                                const clickableClass = isReviewMode ? "cursor-pointer hover:scale-110" : "";
                                
                                return <div key={idx} className={`${dotClass} ${clickableClass}`} onClick={() => isReviewMode && setQuestionIndex(idx)}></div>
                            })}
                        </div>

                        {/* 問題卡片 */}
                        <div className="flex-1 flex flex-col justify-center max-w-6xl w-full mx-auto">
                            <div className="bright-card p-10 mb-8 animate-fade-in-down">
                                <div className="inline-block px-4 py-1 bg-indigo-500 text-white rounded-full text-lg font-bold mb-6">
                                    {question.category}
                                </div>
                                <h2 className="text-4xl md:text-5xl font-bold text-gray-800 leading-tight">
                                    {questionIndex + 1}. {question.question}
                                </h2>
                            </div>

                            {/* 選項或文字題答案區 */}
                            <div className="grid grid-cols-1 gap-4 animate-fade-in-up">
                                {question.type === 'mc' ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {question.options.map((option, idx) => {
                                            const letter = option.charAt(0);
                                            const currentSelectedOption = selectedOptions[questionIndex];
                                            const isCorrectOption = letter === question.correctOption;
                                            const isSelected = currentSelectedOption === letter;
                                            
                                            let optionClass = "bright-card p-6 text-3xl font-bold text-left transition-all ";
                                            if (isRevealed || isReviewMode) {
                                                optionClass += "cursor-default ";
                                                if (isCorrectOption) {
                                                    optionClass += "bg-green-100 border-green-500 text-green-800 shadow-[0_0_20px_rgba(34,197,94,0.4)] transform scale-[1.02] ";
                                                } else if (isSelected) {
                                                    optionClass += "bg-red-100 border-red-500 text-red-800 ";
                                                } else {
                                                    optionClass += "opacity-50 ";
                                                }
                                            } else {
                                                optionClass += "hover:border-indigo-400 cursor-pointer ";
                                            }

                                            return (
                                                <button key={idx} onClick={() => handleOptionClick(option)} className={optionClass}>
                                                    {option}
                                                </button>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center">
                                        {!isRevealed ? (
                                            <button onClick={handleShowAnswer} className="gradient-btn px-12 py-6 rounded-2xl text-4xl font-bold flex items-center gap-4">
                                                <Eye size={40} /> 顯示答案
                                            </button>
                                        ) : (
                                            <div className="bright-card bg-indigo-50 w-full p-8 text-center border-indigo-300">
                                                <p className="text-5xl font-black text-indigo-700 mb-4">{question.answer}</p>
                                                {question.supplement && (
                                                    <p className="text-2xl text-gray-600 mt-4 bg-white/50 p-4 rounded-xl inline-block">{question.supplement}</p>
                                                )}
                                                
                                                {/* 回合一的文字題需要手動評判對錯 */}
                                                {isRound1 && !isReviewMode && (
                                                    <div className="flex justify-center gap-6 mt-8">
                                                        <button onClick={() => handleTextJudge(true)} className={`px-8 py-4 rounded-xl text-3xl font-bold flex items-center gap-2 transition ${currentResult === 'correct' ? 'bg-green-500 text-white shadow-lg scale-110' : 'bg-white border-2 border-green-500 text-green-600 hover:bg-green-50'}`}>
                                                            <CheckCircle size={32} /> 答對
                                                        </button>
                                                        <button onClick={() => handleTextJudge(false)} className={`px-8 py-4 rounded-xl text-3xl font-bold flex items-center gap-2 transition ${currentResult === 'incorrect' ? 'bg-red-500 text-white shadow-lg scale-110' : 'bg-white border-2 border-red-500 text-red-600 hover:bg-red-50'}`}>
                                                            <XCircle size={32} /> 答錯
                                                        </button>
                                                    </div>
                                                )}

                                                {/* 回顧模式顯示作答結果 */}
                                                {isRound1 && isReviewMode && (
                                                    <div className="mt-8">
                                                        {currentResult === 'correct' ? (
                                                            <div className="text-3xl text-green-600 font-bold flex items-center justify-center gap-2"><CheckCircle size={36}/> 標記為：答對</div>
                                                        ) : currentResult === 'incorrect' ? (
                                                            <div className="text-3xl text-red-600 font-bold flex items-center justify-center gap-2"><XCircle size={36}/> 標記為：答錯</div>
                                                        ) : (
                                                            <div className="text-3xl text-gray-500 font-bold flex items-center justify-center gap-2"><Minus size={36}/> 未作答 / 已跳過</div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 底部控制按鈕 */}
                        <div className="flex justify-between mt-auto mb-4 px-8 w-full max-w-6xl mx-auto z-20 relative">
                            <button onClick={handlePrev} disabled={questionIndex === 0} className={`flex items-center gap-2 px-8 py-4 rounded-xl text-2xl font-bold transition ${questionIndex === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white text-indigo-600 shadow-md hover:bg-indigo-50'}`}>
                                <ChevronLeft size={28} /> 上一題
                            </button>
                            
                            <button onClick={handleNext} className="flex items-center gap-2 px-8 py-4 rounded-xl text-2xl font-bold transition gradient-btn">
                                {questionIndex === activeQuestions.length - 1 ? (isReviewMode ? '返回總結' : '完成回合') : '下一題'} <ChevronRight size={28} />
                            </button>
                        </div>
                        
                        {/* 遊戲進行中顯示縮小的計分板 */}
                        <div className="absolute bottom-4 right-8 bg-white/80 backdrop-blur rounded-2xl p-4 shadow-xl border border-white flex gap-4 transform scale-75 origin-bottom-right z-30">
                             {HOUSES.map(house => (
                                <div key={house.id} className="text-center w-20">
                                    <div className={`text-sm font-bold ${house.text}`}>{house.name}</div>
                                    <div className="text-2xl font-black">{scores[house.id]}</div>
                                    {!isRound1 && (
                                        <div className="flex justify-center gap-1 mt-1">
                                            <button onClick={() => adjustScore(house.id, -10)} className="w-6 h-6 bg-red-100 text-red-600 rounded flex items-center justify-center"><Minus size={14}/></button>
                                            <button onClick={() => adjustScore(house.id, 10)} className="w-6 h-6 bg-green-100 text-green-600 rounded flex items-center justify-center"><Plus size={14}/></button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // 根據狀態渲染不同畫面
            return (
                <div className="h-full w-full flex flex-col">
                    {viewMode === 'MAIN_MENU' && renderMainMenu()}
                    {viewMode === 'ROUND_1_MENU' && renderRound1Menu()}
                    {(viewMode === 'ROUND_1_GAME' || viewMode === 'ROUND_2_GAME') && !showSummary && renderGame()}
                    {showSummary && renderSummary()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
